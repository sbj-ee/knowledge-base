name: Resync sources and deploy

# Auto-pulls the latest content from the public source repos, rebuilds the
# site, commits any changes back, and deploys to GitHub Pages.
#
# Triggers:
#   - schedule:            daily, so the site tracks source-repo edits
#   - workflow_dispatch:   run on demand from the Actions tab
#   - repository_dispatch: optional — a source repo can notify this one
#                          (event type: source-updated). See README.
#
# This is self-contained (sync -> build -> deploy in one job) because a push
# made with the default GITHUB_TOKEN does NOT trigger other workflows, so we
# can't rely on the separate deploy.yml firing after a committed resync.

on:
  schedule:
    - cron: "17 6 * * *"   # 06:17 UTC daily
  workflow_dispatch:
  repository_dispatch:
    types: [source-updated]

permissions:
  contents: write   # commit refreshed docs back to the repo
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  resync-build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt

      - name: Pull latest source content (remote mode)
        run: REMOTE=1 ./sync.sh

      - name: Commit refreshed docs if changed
        run: |
          if [[ -n "$(git status --porcelain docs/)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/
            git commit -m "Resync docs from source repos [skip ci]"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No source changes."
          fi
        id: commit

      - name: Build site
        run: mkdocs build --strict --site-dir _site

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
